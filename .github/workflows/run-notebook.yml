name: run-notebook

# Execute the wasm walkthrough end-to-end on every supported platform, so a
# broken bindist or channel (e.g. a missing wasi toolchain) fails loudly rather
# than silently shipping a notebook that doesn't work.
#
# Heavy (ghcup + a native GHC + the wasm cross-compiler + wasi-sdk + a cabal
# build), so not on every push: manual dispatch, a weekly schedule to catch
# upstream bindist/channel drift, and pushes that touch the notebook itself.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  push:
    branches: [master]
    paths:
      - "wasm-hello.nb/**"
      - ".github/workflows/run-notebook.yml"

permissions:
  contents: read

concurrency:
  group: run-notebook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     arch: x86_64-linux }
          - { os: ubuntu-24.04-arm, arch: aarch64-linux }
          - { os: macos-14,         arch: aarch64-darwin }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Runtime libraries the ghcup-installed native build-side GHC links
      # against. GitHub Linux images ship build-essential; the GHC runtime libs
      # are the usual gap.
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libgmp-dev libnuma1 libtinfo6

      # Apple doesn't ship libgmp, which the upstream native GHC bindist needs.
      # Symlink it into /usr/local/lib — a default dyld fallback search path — so
      # `ghc` can dlopen it without DYLD_* env vars (macOS strips those across
      # some exec boundaries).
      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gmp
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$(brew --prefix gmp)/lib/libgmp.10.dylib" /usr/local/lib/libgmp.10.dylib
          ls -l /usr/local/lib/libgmp.10.dylib

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Minimal ghcup only (the binary at ~/.ghcup/bin/ghcup). The notebook's
      # §2 installs the native GHC, the wasm cross-compiler, cabal, and wasi-sdk
      # — exactly what an end user following the landing page does.
      #
      # Force the prefix to $HOME: GitHub's x86_64 image preinstalls ghcup at
      # root-owned /usr/local/.ghcup, which the installer would fail to chmod.
      - name: Install ghcup
        run: |
          set -eux
          # GitHub's x86_64 image preinstalls ghcup and symlinks ~/.ghcup to the
          # root-owned /usr/local/.ghcup, so the installer's chmod hits EPERM.
          # Start from a clean $HOME/.ghcup (no-op on images without the preinstall).
          sudo rm -rf "$HOME/.ghcup"
          export GHCUP_INSTALL_BASE_PREFIX="$HOME"
          echo "GHCUP_INSTALL_BASE_PREFIX=$HOME" >> "$GITHUB_ENV"
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | \
            BOOTSTRAP_HASKELL_NONINTERACTIVE=1 \
            BOOTSTRAP_HASKELL_MINIMAL=1 \
            BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 \
            sh
          test -x "$HOME/.ghcup/bin/ghcup"

      - name: Execute the notebook
        working-directory: wasm-hello.nb
        run: |
          set -uo pipefail
          # Run the real artifact: the flake's JupyterLab + bash kernel.
          # allow_errors=True so every cell runs and the executed notebook is
          # always written (uploaded below for debugging); the marker checks
          # decide pass/fail.
          nix develop -c jupyter nbconvert \
            --to notebook --execute \
            --ExecutePreprocessor.timeout=3000 \
            --ExecutePreprocessor.allow_errors=True \
            --output executed.ipynb \
            "WASM Hello.ipynb" || true
          # Positive checks: the build + run actually produced their outputs.
          # (Full per-cell output is in the uploaded executed.ipynb artifact.)
          miss=
          grep -qF "WebAssembly (wasm) binary module" executed.ipynb \
            || { echo "::error::wasm verify (§2.5) output missing"; miss=1; }
          grep -qF "Hello from the WASM reactor!" executed.ipynb \
            || { echo "::error::run-node greeting (§6) missing"; miss=1; }
          if [ -n "$miss" ]; then exit 1; fi
          echo "✓ ${{ matrix.arch }}: notebook executed; build + run produced the expected output"

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-${{ matrix.arch }}
          path: wasm-hello.nb/executed.ipynb
          if-no-files-found: ignore
